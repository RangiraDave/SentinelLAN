name: Trivy security scan

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Re-scan unchanged dependencies as the vulnerability database evolves.
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trivy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-scan:
    name: Dependencies, secrets, and configuration
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Scan repository with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml
